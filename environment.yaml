# DefectFlywheel 独立 conda 环境
# 创建: conda env create -f environment.yaml
# 激活: conda activate defect_flywheel

name: defect_flywheel
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pip:
    - numpy>=1.20.0,<2.0.0
    - scipy>=1.7.0
    - Pillow>=8.0.0
    - tqdm>=4.60.0
    - PyYAML>=5.4.0
    - torch>=1.10.0
    - torchvision>=0.11.0
    - opencv-python>=4.5.0
    - ftfy
    - regex
    # CLIP（模块二）: pip install git+https://github.com/openai/CLIP.git
    # OFA 子模块（与 DefectFlywheel 共用环境，OFA 自带 ofa/open_clip）
    - diffusers>=0.20.0
    - transformers>=4.30.0
    - timm>=0.4.12
    - kornia>=0.6.0
    - pandas>=1.3.0
    - scikit-learn>=1.0.0
    - tabulate>=0.9.0
    # BlipDiffusion 权重见 ofa/README.md
